<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GripAble Sensor Features — Design Exploration</title>
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  body { margin: 0; background: #f0f0f0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="gripable-features.jsx"></script>
<script type="text/babel" src="gripable-rotate.jsx"></script>
<script type="text/babel" src="gripable-rotate-mobile.jsx"></script>

<script type="text/babel">
const App = () => (
  <DesignCanvas title="GripAble Sensor Features — Design Directions" subtitle="Drag or hover the device on Variant A to rotate. Click any feature for a guided tour — the device animates to the best angle and the lead-line tracks the part. Open any artboard fullscreen to see it as it would ship.">
    <DCSection id="primary" title="Animated rotation (recommended)">
      <DCArtboard id="classic-rotate" label="A — Desktop: drag/hover to rotate, hotspots track per frame" width={1280} height={880}>
        <GAClassicAnimated width={1280} height={880} />
      </DCArtboard>
      <DCArtboard id="classic-mobile" label="A — Mobile: rotation slider + swipeable feature carousel" width={402} height={874}>
        <IOSDevice width={402} height={874}>
          <GAClassicMobile width={402} height={830} />
        </IOSDevice>
      </DCArtboard>
    </DCSection>
    <DCSection id="alts" title="Static alternatives (for comparison)">
      <DCArtboard id="classic" label="A.0 — Classic static (single angle)" width={1280} height={880}>
        <GAClassic width={1280} height={880} />
      </DCArtboard>
      <DCArtboard id="editorial" label="B — Editorial (gradient A-symbol, side panel)" width={1280} height={880}>
        <GAEditorial width={1280} height={880} />
      </DCArtboard>
      <DCArtboard id="spotlight" label="C — Spotlight (blue hero scheme)" width={1280} height={880}>
        <GASpotlight width={1280} height={880} />
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GripAble Banner Preview</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  body {
    margin: 0;
    background: #0b1fd4;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    gap: 14px;
  }
  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    background: rgba(255,255,255,0.95);
    padding: 8px 14px;
    border-radius: 9999px;
    font: 13px var(--font-sans);
    color: #111;
  }
  .toolbar button {
    border: 1px solid #ddd;
    background: #fff;
    padding: 5px 12px;
    border-radius: 9999px;
    cursor: pointer;
    font: inherit;
  }
  .toolbar button.active { background: var(--ac-blue); color: #fff; border-color: var(--ac-blue); }
  /* Wrapper sets the width; the GripableRotate component is fully responsive
     and adapts its layout via ResizeObserver (mobile <700, tablet 700–1100, desktop ≥1100). */
  #stage-wrap {
    width: 1280px;
    max-width: 100%;
    border-radius: 12px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    overflow: hidden;
    transition: width 280ms cubic-bezier(0.16,1,0.3,1);
  }
  .hint { color: rgba(255,255,255,0.85); font: 12px var(--font-sans); }
</style>
</head>
<body>
  <div class="toolbar">
    <span style="font-weight:600">Width:</span>
    <button data-w="1280" class="active">1280</button>
    <button data-w="1024">1024</button>
    <button data-w="900">900 (tablet)</button>
    <button data-w="600">600 (mobile)</button>
    <button data-w="375">375 (mobile sm)</button>
    <span style="margin-left:14px;color:#666">Drag, hover, or arrow-keys to rotate. Click a card to focus a feature.</span>
  </div>
  <div id="stage-wrap"><div id="stage"></div></div>
  <div class="hint">preview.html — renders gripable-rotate.jsx (responsive: mobile / tablet / desktop)</div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="env,react" src="gripable-rotate.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const root = ReactDOM.createRoot(document.getElementById("stage"));
  function mount() {
    if (!window.GripableRotate) { setTimeout(mount, 50); return; }
    root.render(<window.GripableRotate />);
  }
  mount();

  document.querySelectorAll(".toolbar button[data-w]").forEach((btn) => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".toolbar button[data-w]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("stage-wrap").style.width = btn.dataset.w + "px";
    });
  });
</script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" role="img" aria-label="United Kingdom flag">
  <defs>
    <clipPath id="uk-clip"><rect width="60" height="60" rx="6" ry="6"/></clipPath>
    <clipPath id="uk-quad"><path d="M30,30 h30 v30 z v30 h-30 z h-30 v-30 z v-30 h30 z"/></clipPath>
  </defs>
  <g clip-path="url(#uk-clip)">
    <rect width="60" height="60" fill="#012169"/>
    <path d="M0,0 L60,60 M60,0 L0,60" stroke="#fff" stroke-width="12"/>
    <path d="M0,0 L60,60 M60,0 L0,60" clip-path="url(#uk-quad)" stroke="#C8102E" stroke-width="8"/>
    <path d="M30,0 v60 M0,30 h60" stroke="#fff" stroke-width="20"/>
    <path d="M30,0 v60 M0,30 h60" stroke="#C8102E" stroke-width="12"/>
  </g>
</svg>
